<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手續費區間表</title>
  <meta name="format-detection" content="telephone=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-size-base: 16px;
      --primary-color: #1e3a8a;
      --primary-light: #eff6ff;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
      --highlight-color: #fef08a;
      --highlight-border: #eab308;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: var(--font-size-base);
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      line-height: 1.5;
    }

    .container { width: 100%; max-width: 700px; margin: 0 auto; }

    /* 置頂容器 */
    .top-sticky-container {
      position: sticky; top: 0; left: 0; right: 0; margin: 0 auto;
      width: 100%; max-width: 700px; z-index: 1000;
      background-color: var(--bg-color);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .table-header {
      display: flex; width: 100%; height: 44px;
      background-color: var(--primary-color); color: #ffffff;
      font-weight: 600; font-size: .8rem; border-bottom: 1px solid var(--border-color);
    }

    .top-control-bar {
      display: flex; align-items: center; background-color: #ffffff;
      padding: 8px 16px; height: 68px; border-bottom: 1px solid var(--border-color);
    }

    .input-group {
      display: flex; width: 100%; border: 1px solid var(--border-color);
      border-radius: 6px; overflow: hidden; background-color: var(--bg-color);
    }

    .input-group input[type="number"] {
      border: none; outline: none; padding: 0 16px; height: 52px;
      flex: 1; font-size: 1.15rem; font-weight: 600; background: transparent; width: 100%;
    }

    .input-group input[type="number"]::-webkit-outer-spin-button,
    .input-group input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .input-group input[type="number"] { -moz-appearance: textfield; }

    .input-group .btn-group { display: flex; align-items: center; }

    .input-group button {
      border: none; background-color: transparent; width: 52px; height: 52px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background-color 0.2s;
    }

    .input-group .btn-clear { color: var(--text-muted); font-size: 1rem; }
    .input-group .btn-clear:hover { color: #ef4444; background-color: rgba(0, 0, 0, 0.02); }

    .input-group .btn-action {
      background-color: var(--primary-light); color: var(--primary-color);
      font-size: 1.3rem; font-weight: bold; border-left: 1px solid var(--border-color);
    }
    .input-group .btn-action:hover { background-color: #dbeafe; }

    .input-group button, .input-group input[type="number"] { touch-action: manipulation; }

    /* 修正白邊問題：將表格卡片寬度與置頂區域完全鎖定對齊 */
    .table-card { 
      background-color: var(--card-bg); 
      overflow: hidden; 
      display: flex; 
      flex-direction: column;
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border-color);
    }

    .table-row {
      display: flex; width: 100%; align-items: middle;
      transition: background-color 0.2s ease;
      border-bottom: 1px solid var(--border-color);
    }
    .table-row:last-child { border-bottom: none; }
    .table-body .table-row:nth-child(even) { background-color: var(--primary-light); }

    .table-cell { padding: 0.75rem 1rem; display: flex; align-items: center; }
    .col-1 { width: 15%; justify-content: center; }
    .col-2 { width: 40%; }
    .col-3 { width: 45%; }

    .table-row.highlighted { background-color: var(--highlight-color) !important; position: relative; z-index: 5; }
    .fee-badge { display: inline-block; color: var(--primary-color); font-weight: bold; font-size: 0.9rem; text-align: center; min-width: 2rem; }
    .amount-range { font-weight: 700; font-size: 0.9rem; color: #111827; }
    .explanation { font-size: 0.6rem; color: var(--text-muted); line-height: 1.3; }

    @media (max-width: 480px) { .table-cell { padding: 0.6rem 0.5rem; } }
  </style>
</head>

<body>
  <div class="container">
    <!-- 置頂容器 -->
    <div class="top-sticky-container">
      <div class="table-header">
        <div class="table-cell col-1">手續費</div>
        <div class="table-cell col-2">區間</div>
        <div class="table-cell col-3">備註</div>
      </div>
      <div class="top-control-bar">
        <div class="input-group">
          <input type="number" id="amountInput" placeholder="請輸入金額" min="0" inputmode="numeric" pattern="[0-9]*">
          <div class="btn-group">
            <button class="btn-clear" id="clearBtn" title="清除金額">✕</button>
            <button class="btn-action btn-minus" id="minusBtn">−</button>
            <button class="btn-action btn-plus" id="plusBtn">＋</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 表格卡片 -->
    <div class="table-card">
      <div class="table-body" id="feeTableBody"></div>
    </div>
  </div>

  <script>
    const amountInput = document.getElementById('amountInput');
    const clearBtn = document.getElementById('clearBtn');
    const minusBtn = document.getElementById('minusBtn');
    const plusBtn = document.getElementById('plusBtn');
    const tableBody = document.getElementById('feeTableBody');

    const allData = [];
    const totalRows = 200;

    // 1. 動態初始化 1~200 筆數據結構
    let currentMin = 1;
    for (let i = 1; i <= totalRows; i++) {
      let currentMax;
      if (i === 1) currentMax = 1403;
      else if (i === 190) currentMax = 140035; 
      else {
        currentMax = Math.floor((i + 1) / 0.001425);
        if(i === 200) currentMax = 141052;
      }

      const formatMin = currentMin.toLocaleString();
      const formatMax = currentMax.toLocaleString();
      const exp1 = `${formatMin} × 0.1425% = ${(currentMin * 0.001425).toFixed(6).replace(/0+$/, '').replace(/\.$/, '')}`;
      const exp2 = `${formatMax} × 0.1425% = ${(currentMax * 0.001425).toFixed(6).replace(/0+$/, '').replace(/\.$/, '')}`;

      const row = document.createElement('div');
      row.className = 'table-row';
      row.innerHTML = `
        <div class="table-cell col-1"><span class="fee-badge">${i}</span></div>
        <div class="table-cell col-2"><div class="amount-range">${formatMin} - ${formatMax}</div></div>
        <div class="table-cell col-3"><div class="explanation">${exp1}<br>${exp2}</div></div>
      `;

      allData.push({ element: row, min: currentMin, max: currentMax, index: i });
      currentMin = currentMax + 1;
    }

    // 2. 渲染函式（已修正 5 列顯示失敗的迴圈 Bug）
    function renderTable() {
      const value = parseInt(amountInput.value, 10);
      
      tableBody.innerHTML = '';
      allData.forEach(item => item.element.classList.remove('highlighted'));

      // 【情況 A】沒有輸入數值：展示完整 200 列清單
      if (isNaN(value)) {
        allData.forEach(item => tableBody.appendChild(item.element));
        return;
      }

      // 尋找當前命中區間的索引
      const matchIndex = allData.findIndex(item => value >= item.min && value <= item.max);

      if (matchIndex !== -1) {
        allData[matchIndex].element.classList.add('highlighted');

        // 【情況 B】精準切換為：上下各兩階 + 當前命中列 = 共 5 列
        const start = Math.max(0, matchIndex - 2);
        const end = Math.min(allData.length - 1, matchIndex + 2);

        // 修正後的正確 For 迴圈
        for (let k = start; k <= end; k++) {
          tableBody.appendChild(allData[k].element);
        }
      } else if (value > 141052) {
        // 超過最大極限時：展示最後 5 筆
        for (let k = allData.length - 5; k < allData.length; k++) {
          tableBody.appendChild(allData[k].element);
        }
        allData[allData.length - 1].element.classList.add('highlighted');
      }
    }

    // 初始載入完整表單
    renderTable();

    // 3. 事件監聽
    amountInput.addEventListener('input', renderTable);

    clearBtn.addEventListener('click', (e) => {
      e.preventDefault();
      amountInput.value = '';
      renderTable();
      amountInput.focus();
    });

    minusBtn.addEventListener('click', (e) => {
      e.preventDefault();
      let currentVal = parseInt(amountInput.value, 10) || 0;
      if (currentVal > 0) {
        amountInput.value = currentVal - 1;
        renderTable();
      }
    });

    plusBtn.addEventListener('click', (e) => {
      e.preventDefault();
      let currentVal = parseInt(amountInput.value, 10) || 0;
      amountInput.value = currentVal + 1;
      renderTable();
    });
  </script>
</body>

</html>
